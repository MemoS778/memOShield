{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h2>memOShield // GIRIS</h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash">
      {% for cat, msg in messages %}
        <div class="toast {{ cat }}">{{ msg }}</div>
      {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  <form method="post">
    <label>Sifre</label>
    <input name="password" type="password" placeholder="Yonetici sifresi" required />
    <div class="row">
      <button class="siem-btn accent" type="submit">GIRIS</button>
      <a class="siem-btn" href="/demo">DEMO</a>
    </div>
  </form>
</div>
{% endblock %}
